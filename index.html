<!DOCTYPE html>
<html lang="vi">
<script>
    MathJax = {
        tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }
    };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Flashcard Thông Minh</title>
    <link rel="stylesheet" href="styles.css">
</head><body>
    
    <div id="menu" class="menu-container">
        <h1>📚 Ôn Tập Hệ Điều Hành</h1>
        <div class="grid">
            <button class="btn-chuong" onclick="loadChapter(1, 'Chương 1: Tổng quan')">Chương 1: Tổng quan</button>
            <button class="btn-chuong" onclick="loadChapter(2, 'Chương 2: Quản lý tiến trình')">Chương 2: Quản lý tiến trình</button>
            <button class="btn-chuong" onclick="loadChapter(3, 'Chương 3: Quản lý bộ nhớ')">Chương 3: Quản lý bộ nhớ</button>
            <button class="btn-chuong" onclick="loadChapter(4, 'Chương 4: Quản lý tập tin')">Chương 4: Quản lý tập tin</button>
            <button class="btn-chuong" onclick="loadChapter(5, 'Chương 5: Quản lý hệ thống vào ra')">Chương 5: Quản lý hệ thống vào ra</button>
        </div>
        
        <input id="file-input" type="file" accept=".txt" class="hidden" onchange="loadFromFile(event)" />
        <div id="error" class="hidden" style="margin-top: 15px; color: #c0392b; text-align: center;"></div>
    </div>

    <div id="split-view" class="hidden">
        <div class="header-controls">
            <button class="back-btn" onclick="goBack()">⬅ Quay lại Menu</button>
            <h2 id="chapter-title"></h2>
        </div>
        
        <div class="split-container">
            <div class="panel theory-panel">
                <h3 class="panel-title">📖 Lý Thuyết</h3>
                <div id="theory-content"></div>
            </div>
            
            <div class="panel quiz-panel">
                <h3 class="panel-title">❓ Flashcard (Bài tập)</h3>
                <div id="flashcard-list"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
